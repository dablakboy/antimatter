<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Antimatter — Download IPA</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.1/vanilla-tilt.min.js"></script>
  <style>
    :root {
      --bg: linear-gradient(135deg, #f0f2f5 0%, #e8ecef 100%);
      --glass: rgba(255, 255, 255, 0.35);
      --blur: blur(20px);
      --border: 1px solid rgba(255, 255, 255, 0.5);
      --shadow: 0 20px 60px rgba(0,0,0,0.18);
      --accent: #007aff;
      --scroll-speed: 40s;
    }

    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #1d1d1f;
      overflow-x: hidden;
    }

    .app-container {
      width: 92%;
      max-width: 460px;
      padding: 20px 12px;
      text-align: center;
      animation: fadeIn 1.2s ease-out;
    }

    @keyframes fadeIn {
      from { opacity:0; transform: translateY(20px); }
      to   { opacity:1; transform: translateY(0); }
    }

    .app-card {
      background: var(--glass);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      border: var(--border);
      border-radius: 28px;
      box-shadow: var(--shadow);
      padding: 28px 32px 24px;
      transform-style: preserve-3d;
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.4s;
    }

    .app-card:hover {
      box-shadow: 0 40px 100px rgba(0,0,0,0.25);
      transform: scale(1.02);
    }

    .icon {
      width: 110px;
      height: 110px;
      margin: 0 auto 16px;
      overflow: hidden;
      border-radius: 24px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.2);
    }

    .icon img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    h1 {
      font-size: 2.3rem;
      font-weight: 800;
      margin-bottom: 4px;
    }

    .subtitle {
      font-size: 1.1rem;
      color: #6e6e73;
      margin-bottom: 16px;
    }

    .description {
      font-size: 1.02rem;
      line-height: 1.5;
      margin-bottom: 18px;
      color: #3c3c43;
    }

    .screenshots-wrapper {
      overflow: hidden;
      margin: 10px 0 20px 0;
      padding: 4px 0;
      position: relative;
    }

    .screenshots {
      display: flex !important;
      flex-direction: row !important;
      flex-wrap: nowrap !important;
      gap: 20px;
      animation: scroll var(--scroll-speed) linear infinite;
      width: max-content;
      will-change: transform;
    }

    .screenshots:hover {
      animation-play-state: paused;
    }

    @keyframes scroll {
      0%   { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    .screenshot {
      width: 100px;
      height: 200px;
      border-radius: 24px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.18);
      flex-shrink: 0;
      overflow: hidden;
      background: #fff;
    }

    .screenshot img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .download-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: var(--accent);
      color: white;
      font-size: 1.28rem;
      font-weight: 700;
      padding: 13px 42px;
      border-radius: 999px;
      text-decoration: none;
      box-shadow: 0 10px 28px rgba(0,122,255,0.3);
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      margin-top: 4px;
    }

    .download-btn:hover {
      transform: translateY(-4px) scale(1.05);
      box-shadow: 0 20px 48px rgba(0,122,255,0.5);
    }

    .small-text {
      margin-top: 24px;
      font-size: 0.85rem;
      color: #8e8e93;
    }

    /* ────────────────────────────────────────────────
       DESKTOP – wide + very compact vertically
    ──────────────────────────────────────────────── */
    @media (min-width: 768px) {
      .app-container {
        max-width: 1150px;
        padding: 30px 20px;
      }

      .app-card {
        padding: 32px 60px 24px;
        border-radius: 40px;
      }

      .icon {
        width: 130px;
        height: 130px;
        margin-bottom: 14px;
      }

      h1 { font-size: 3.0rem; margin-bottom: 4px; }
      .subtitle { font-size: 1.25rem; margin-bottom: 14px; }
      .description {
        font-size: 1.15rem;
        line-height: 1.55;
        max-width: 950px;
        margin: 0 auto 18px;
      }

      .screenshot {
        width: 135px;
        height: 270px;
        border-radius: 32px;
      }

      .screenshots {
        gap: 30px;
      }

      .screenshots-wrapper {
        margin: 12px 0 22px 0;
      }

      .download-btn {
        font-size: 1.45rem;
        padding: 16px 56px;
        margin-top: 2px;
      }

      .small-text {
        margin-top: 26px;
        font-size: 0.92rem;
      }
    }

    @media (min-width: 1400px) {
      .app-container { max-width: 1240px; }
    }
  </style>
</head>
