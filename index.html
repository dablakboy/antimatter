<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Antimatter — Download IPA</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.1/vanilla-tilt.min.js"></script>
  <style>
    :root {
      --bg: linear-gradient(135deg, #f0f2f5 0%, #e8ecef 100%);
      --glass: rgba(255, 255, 255, 0.35);
      --blur: blur(20px);
      --border: 1px solid rgba(255, 255, 255, 0.5);
      --shadow: 0 25px 70px rgba(0,0,0,0.18);
      --accent: #007aff;
      --scroll-speed: 40s; /* Slightly slower for better viewing */
    }

    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #1d1d1f;
      overflow-x: hidden;
    }

    .app-container {
      width: 92%;
      max-width: 460px;
      padding: 40px 15px;
      text-align: center;
      animation: fadeIn 1.4s ease-out;
    }

    @keyframes fadeIn {
      from { opacity:0; transform: translateY(50px); }
      to   { opacity:1; transform: translateY(0); }
    }

    .app-card {
      background: var(--glass);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      border: var(--border);
      border-radius: 36px;
      box-shadow: var(--shadow);
      padding: 40px 25px;
      transform-style: preserve-3d;
      transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.5s;
    }

    .app-card:hover {
      box-shadow: 0 50px 120px rgba(0,0,0,0.28);
      transform: scale(1.03);
    }

    .icon {
      width: 140px;
      height: 140px;
      margin: 0 auto 24px;
      overflow: hidden;
      border-radius: 32px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.25);
    }

    .icon img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    h1 {
      font-size: 2.6rem;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 1.2rem;
      color: #6e6e73;
      margin-bottom: 32px;
    }

    .description {
      font-size: 1.1rem;
      line-height: 1.6;
      margin-bottom: 32px;
      color: #3c3c43;
    }

    /* Carousel – only 4 screenshots visible, infinite loop */
    .screenshots-wrapper {
      overflow: hidden;
      margin: 20px 0 30px 0;
      padding: 10px 0;
      position: relative;
    }

    .screenshots {
      display: flex !important;
      flex-direction: row !important;
      flex-wrap: nowrap !important;
      gap: 20px;
      animation: scroll var(--scroll-speed) linear infinite;
      width: max-content;
      will-change: transform;
    }

    .screenshots:hover {
      animation-play-state: paused;
    }

    @keyframes scroll {
      0%   { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    .screenshot {
      width: 110px;
      height: 220px;
      border-radius: 28px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      flex-shrink: 0;
      overflow: hidden;
      background: #fff;
    }

    .screenshot img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .download-btn {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      background: var(--accent);
      color: white;
      font-size: 1.35rem;
      font-weight: 700;
      padding: 16px 48px;
      border-radius: 999px;
      text-decoration: none;
      box-shadow: 0 12px 35px rgba(0,122,255,0.35);
      transition: all 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      margin-top: 10px;
    }

    .download-btn:hover {
      transform: translateY(-5px) scale(1.06);
      box-shadow: 0 25px 60px rgba(0,122,255,0.55);
    }

    .small-text {
      margin-top: 40px;
      font-size: 0.9rem;
      color: #8e8e93;
    }

    /* Desktop – wider rectangular card, larger horizontal carousel */
    @media (min-width: 768px) {
      .app-container {
        max-width: 760px;
        padding: 60px 30px;
      }

      .app-card {
        padding: 50px 60px;
        border-radius: 44px;
      }

      .icon {
        width: 160px;
        height: 160px;
        border-radius: 40px;
      }

      h1 { font-size: 3.2rem; }
      .subtitle { font-size: 1.35rem; }
      .description { font-size: 1.25rem; max-width: 85%; margin: 0 auto 40px; }

      .screenshot {
        width: 140px;
        height: 280px;
        border-radius: 36px;
      }

      .screenshots {
        gap: 32px;
      }

      .download-btn {
        font-size: 1.5rem;
        padding: 20px 60px;
      }

      .screenshots-wrapper {
        margin: 30px 0 40px 0;
      }
    }
  </style>
</head>
